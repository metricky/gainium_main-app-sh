          schema:
            type: number
            example: 10000000
        - name: sort
          in: query
          required: false
          description: Sort field
          schema:
            type: string
            default: marketCapRank
            enum: [marketCapRank, currentPrice, priceChangePercentage24h, totalVolume, marketCap]
        - name: order
