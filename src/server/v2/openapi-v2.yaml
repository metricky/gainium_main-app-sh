            example: "Layer 1"
        - name: minMarketCap
          in: query
          required: false
          description: Minimum market capitalization
          schema:
            type: number
            example: 1000000000
        - name: maxMarketCap
          in: query
          required: false
          description: Maximum market capitalization
          schema:
            type: number
        - name: minVolume
