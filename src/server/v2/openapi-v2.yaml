  /api/v2/deals/dca/update:
    patch:
      summary: Update DCA Deal
      description: Update DCA deal settings and parameters
      tags:
        - Deals
      operationId: updateDCADeal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dealId:
                  type: string
                  format: uuid
                  description: Deal UUID to update
                ordersCount:
                  type: integer
                  description: DCA orders count
                step:
                  type: string
                  description: Step percentage between DCA orders
                tpPerc:
                  type: string
                  description: Take profit percentage
                slPerc:
                  type: string
                  description: Stop loss percentage
                orderSize:
                  type: string
                  description: DCA order quantity
                useTp:
                  type: boolean
                  description: Enable take profit
                useSl:
                  type: boolean
                  description: Enable stop loss
                useDca:
                  type: boolean
                  description: Enable DCA orders
                activeOrdersCount:
                  type: integer
                  description: Active orders count
                volumeScale:
                  type: string
                  description: Volume scale of DCA orders
                stepScale:
                  type: string
                  description: Step scale of DCA orders
      responses:
        '200':
          description: Deal updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
        '400':
          $ref: '#/paths/~1api~1v2~1bots~1dca/get/responses/400'
        '401':
