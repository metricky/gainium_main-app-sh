        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
      responses:
        "200":
          description: Successful response with global variables
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalVariableListResponse"
              example:
                status: OK
                reason: null
                data:
                  - _id: 650e8400-e29b-41d4-a716-446655440001
                    name: myVariable
                    type: text
                    value: "100"
                    userId: 650e8400-e29b-41d4-a716-446655440002
                    botAmount: 5
                    createdAt: "2024-01-01T00:00:00Z"
                    updatedAt: "2024-01-01T00:00:00Z"
                  - _id: 650e8400-e29b-41d4-a716-446655440003
                    name: stopLossPercent
                    type: float
                    value: "5.5"
                    userId: 650e8400-e29b-41d4-a716-446655440002
                    botAmount: 12
                    createdAt: "2024-01-01T00:00:00Z"
                    updatedAt: "2024-01-01T00:00:00Z"
                meta:
                  page: 1
                  total: 1
                  count: 2
                  onPage: 2
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Create Global Variable
      description: |
        Create a new global variable. The value type must match the specified type:
        - `int`: Value must be a valid integer
        - `float`: Value must be a valid float number
        - `text`: Value can be any string

        Requires write permission of API keys.
      tags:
        - User
      operationId: createGlobalVariable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
                - value
              properties:
                name:
                  type: string
                  description: Variable name
                  example: myStopLoss
                type:
                  type: string
                  enum:
                    - text
                    - int
                    - float
                  description: Variable type
                  example: float
                value:
                  type: string
                  description: Variable value (always sent as string, validated based on type)
                  example: "5.5"
      responses:
        "200":
          description: Global variable created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - OK
                    example: OK
                  reason:
                    type: string
                    nullable: true
                    example: null
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: ID of the created variable
                        example: 650e8400-e29b-41d4-a716-446655440001
                      name:
                        type: string
                        example: myStopLoss
                      type:
                        type: string
                        enum:
                          - text
                          - int
                          - float
                        example: float
                      value:
                        type: string
                        example: "5.5"
                      botAmount:
                        type: integer
                        description: Number of bots using this variable
                        example: 0
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - NOTOK
                    example: NOTOK
                  reason:
                    type: string
                    example: Value must be a valid float number
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
