            schema:
              type: object
              properties:
                name:
                  type: string
                  description: New variable name (optional)
                  example: updatedName
                type:
                  type: string
                  enum:
                    - text
                    - int
                    - float
                  description: New variable type (optional)
                  example: int
                value:
                  type: string
                  description: New variable value (optional, must match type)
