  /api/v2/user/balances:
    get:
      summary: Get Balances
      description: |
        Retrieve user balances across all exchanges with optional field selection.

        **Query Parameters:**
        - `exchangeId`: Filter by exchange connection ID  
        - `asset`: Filter by specific asset (e.g., BTC, USDT)
        - `assets`: Filter by multiple assets (comma-separated)
        - `paperContext`: Filter by paper/real trading context

        **Field Presets:**
        - `minimal`: asset, free, locked, exchangeUUID
        - `standard`: minimal + exchange, paperContext
        - `full`: All available fields (same as standard for balances)
      tags:
        - User
      operationId: getUserBalances
      parameters:
        - $ref: "#/components/parameters/FieldsParam"
        - $ref: "#/components/parameters/PaperContextHeader"
        - name: exchangeId
          in: query
          required: false
          description: Filter by exchange connection ID (if not provided, all exchanges will be included)
          schema:
            type: string
            format: uuid
            example: 650e8400-e29b-41d4-a716-446655440001
        - name: asset
          in: query
          required: false
          description: Filter by specific asset symbol
          schema:
            type: string
            example: BTC
        - name: assets
          in: query
          required: false
          description: Filter by multiple assets (comma-separated list)
          schema:
            type: string
            example: BTC,USDT,ETH
      responses:
        "200":
          description: Successful response with user balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceListResponse"
              examples:
                standard:
                  summary: Standard preset for balances
                  value:
                    status: OK
                    reason: null
                    data:
                      - asset: BTC
                        free: "0.5"
                        locked: "0.1"
                        exchangeUUID: 650e8400-e29b-41d4-a716-446655440001
                        exchange: binance
                        paperContext: null
                      - asset: USDT
                        free: "10000"
                        locked: "2500"
                        exchangeUUID: 650e8400-e29b-41d4-a716-446655440001
                        exchange: binance
                        paperContext: null
                    meta:
                      page: 1
                      total: 25
                      count: 25
                      onPage: 2
                      fields:
                        - asset
                        - free
                        - locked
                        - exchangeUUID
                        - exchange
                        - paperContext
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
