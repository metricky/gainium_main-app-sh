    get:
      summary: Get Crypto Screener Data
      description: |
        Retrieve crypto screening data with market metrics and optional field selection.

        **Query Parameters:**
        - `category`: Filter by category (e.g., "Layer 1", "DeFi")
        - `minMarketCap`: Minimum market cap filter
        - `maxMarketCap`: Maximum market cap filter
        - `minVolume`: Minimum 24h volume filter
        - `sort`: Sort field (default: marketCapRank)
        - `order`: Sort order (`asc` or `desc`, default: asc)

        **Field Presets:**
        - `minimal`: symbol, name, currentPrice, priceChangePercentage24h, totalVolume, marketCap, marketCapRank
        - `standard`: minimal + 1h/7d price changes, volume change, market cap change, volatility, liquidity, category
        - `extended`: standard + 30d/1y changes, ATH/ATL data, multi-day volatility, exchanges, sparkline
        - `full`: All available fields

        **Note:** Requires active subscription with screener access.
      tags:
        - General
      operationId: getScreenerData
      parameters:
        - $ref: "#/components/parameters/FieldsParam"
        - $ref: "#/components/parameters/PageParam"
        - name: category
          in: query
          required: false
          description: Filter by coin category
          schema:
            type: string
            example: Layer 1
        - name: minMarketCap
          in: query
          required: false
          description: Minimum market capitalization
          schema:
            type: number
            example: 1000000000
        - name: maxMarketCap
          in: query
          required: false
          description: Maximum market capitalization
          schema:
            type: number
        - name: minVolume
          in: query
          required: false
          description: Minimum 24h trading volume
          schema:
            type: number
            example: 10000000
        - name: sort
          in: query
          required: false
          description: Sort field
          schema:
            type: string
            default: marketCapRank
            enum:
              - marketCapRank
              - currentPrice
              - priceChangePercentage24h
              - totalVolume
              - marketCap
        - name: order
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            default: asc
            enum:
              - asc
              - desc
      responses:
        "200":
          description: Successful response with screener data
          content:
            application/json:
