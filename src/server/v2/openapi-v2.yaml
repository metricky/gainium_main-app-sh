        - `minMarketCap`: Minimum market cap filter
        - `maxMarketCap`: Maximum market cap filter
        - `minVolume`: Minimum 24h volume filter
        - `sort`: Sort field (default: marketCapRank)
        - `order`: Sort order (`asc` or `desc`, default: asc)
        
