components:
  schemas:
    BaseSettings:
      type: object
      description: BaseSettings configuration
      properties:
        name:
          type: string
          example: null
        profitCurrency:
          type: object
        orderFixedIn:
          type: object
        pair:
          type: string
          description: Trading pair symbol
          example: BTC/USDT
        futures:
          type: boolean
          description: Enable futures trading
          example: false
        coinm:
          type: boolean
          description: Coin-margined futures
          example: false
        marginType:
          type: string
          description: Margin type for futures
          enum:
            - inherit
            - cross
            - isolated
          example: cross
        leverage:
          type: number
          description: Leverage multiplier
          example: 10
        strategy:
          type: string
          description: Trading strategy direction (long or short)
          enum:
            - LONG
            - SHORT
          example: LONG
    BotSettings:
      type: object
      description: BotSettings configuration
      properties: {}
      allOf:
        - $ref: '#/components/schemas/BaseSettings'
        - type: object
          properties:
            pair:
              type: string
              description: Trading pair symbol
              example: BTC/USDT
            topPrice:
              type: number
              description: Top price of grid range
              example: 55000
            lowPrice:
              type: number
              description: Bottom price of grid range
              example: 45000
            levels:
              type: number
              description: Number of grid levels
              example: 10
            gridStep:
              type: number
              description: Step between grid levels
              example: 1000
            budget:
              type: number
              description: Total budget allocated to bot
              example: 10000
            ordersInAdvance:
              type: number
              description: Orders to place in advance
              example: 5
            useOrderInAdvance:
              type: boolean
              description: Enable advance order placement
              example: true
            prioritize:
              type: object
              description: Prioritization settings
              example: volume
            sellDisplacement:
              type: number
              description: Displacement for sell orders
              example: 0.5
            gridType:
              type: object
              description: Type of grid
              example: arithmetic
            tpSl:
              type: boolean
              description: Combined TP/SL for grid
              example: false
            tpSlCondition:
              type: object
              description: Condition for TP/SL trigger
              example: any
            tpSlAction:
              type: object
              description: Action for TP/SL
              example: close
            sl:
              type: boolean
              description: Enable stop loss for grid
              example: false
            slCondition:
              type: object
              description: Stop loss trigger condition
              example: price
            slAction:
              type: object
              description: Stop loss action
              example: closeAll
            tpPerc:
              type: number
              description: Take profit percentage
              example: '2.5'
            slPerc:
              type: number
              description: Stop loss percentage
              example: '1.5'
            tpTopPrice:
              type: number
              description: Take profit top price
              example: 60000
            slLowPrice:
              type: number
              description: Stop loss bottom price
              example: 40000
            updatedBudget:
              type: boolean
              description: Budget has been updated
              example: false
            useStartPrice:
              type: boolean
              description: Use custom start price
              example: false
            startPrice:
              type: string
              description: Custom start price
              example: '50000'
            futures:
              type: boolean
              description: Enable futures trading
              example: false
            newProfit:
              type: boolean
              description: New profit calculation
              example: false
            newBalance:
              type: boolean
              description: New balance mode
              example: false
            coinm:
              type: boolean
              description: Coin-margined futures
              example: false
            strategy:
              type: string
              description: Trading strategy direction (long or short)
              enum:
                - LONG
                - SHORT
              example: LONG
            futuresStrategy:
              type: string
              description: Futures trading strategy
              enum:
                - LONG
                - SHORT
                - NEUTRAL
              example: LONG
            slLimit:
              type: boolean
              description: Use limit orders for stop loss
              example: false
            tpSlLimit:
              type: boolean
              description: Use limit orders for TP/SL
              example: false
            feeOrder:
              type: boolean
              description: Include fees in order calculation
              example: true
            lastPriceRangeAlert:
              type: number
              description: Alert when price near range
              example: 5
            skipBalanceCheck:
              type: boolean
              description: Skip balance verification
              example: false
    DCABotSettings:
      type: object
      description: DCABotSettings configuration
      properties: {}
      allOf:
        - $ref: '#/components/schemas/BaseSettings'
        - type: object
          properties:
            skipBalanceCheck:
              type: boolean
              description: Skip balance verification
              example: false
            dcaCondition:
              type: string
              description: Condition for DCA orders
              enum:
                - percentage
                - indicators
                - custom
                - dynamicAr
              example: percentage
            dcaVolumeBaseOn:
              type: string
              description: How DCA volume is calculated
              enum:
                - scale
                - change
              example: scale
            dcaVolumeRequiredChange:
              type: string
              description: Required change for volume adjustment
              example: '10'
            dcaVolumeMaxValue:
              type: string
              description: Maximum volume value
              example: '1000'
            dcaVolumeRequiredChangeRef:
              type: string
              description: Reference for volume change (TP or average)
              enum:
                - tp
                - avg
              example: tp
            baseSlOn:
              type: string
              description: Stop loss based on start or average price
              enum:
                - start
                - avg
              example: avg
            dcaCustom:
              type: array
              description: Custom DCA configuration array
              items:
                $ref: '#/components/schemas/DCACustom'
              example: []
            strategy:
              type: string
              description: Trading strategy direction (long or short)
              enum:
                - LONG
                - SHORT
              example: LONG
            baseOrderSize:
              type: string
              description: Size of the initial base order
              example: '100'
            baseOrderPrice:
              type: string
              description: Price for the base order
              example: '50000'
            useLimitPrice:
              type: boolean
              description: Use limit price for orders
              example: false
            startOrderType:
              type: string
              description: Order type for opening position
              enum:
                - LIMIT
                - MARKET
              example: MARKET
            startCondition:
              type: string
              description: Condition to start a new deal
              enum:
                - ASAP
                - Manual
                - TradingviewSignals
                - Timer
                - TechnicalIndicators
              example: ASAP
            tpPerc:
              type: string
              description: Take profit percentage
              example: '2.5'
            slPerc:
              type: string
              description: Stop loss percentage
              example: '1.5'
            orderSize:
              type: string
              description: Size of each order
              example: '100'
            step:
              type: string
              description: Price deviation % for next DCA order
              example: '1.5'
            ordersCount:
              type: number
              description: Maximum number of DCA orders
              example: 5
            activeOrdersCount:
              type: number
              description: Number of active orders to maintain
              example: 3
            volumeScale:
              type: string
              description: Volume multiplier for each DCA order
              example: '1.5'
            stepScale:
              type: string
              description: Step multiplier for each DCA order
              example: '1.2'
            minimumDeviation:
              type: string
              description: Minimum price deviation to trigger DCA
              example: '0.5'
            useTp:
              type: boolean
              description: Enable take profit
              example: true
            useSl:
              type: boolean
              description: Enable stop loss
              example: true
            useSmartOrders:
              type: boolean
              description: Enable smart order execution
              example: false
            minOpenDeal:
              type: string
              description: Minimum price to open deals
              example: '1'
            maxOpenDeal:
              type: string
              description: Maximum price to open deals
              example: '5'
            useDca:
              type: boolean
              description: Enable Dollar Cost Averaging
              example: true
            hodlDay:
              type: string
              description: Days between opening new deal
              example: '7'
            hodlAt:
              type: string
              description: Time to open new deal
              example: '23:59'
            hodlHourly:
              type: boolean
              description: Hold on hourly basis
              example: false
            hodlNextBuy:
              type: number
              description: Next buy time in hours
              example: 24
            maxNumberOfOpenDeals:
              type: string
              description: Maximum concurrent open deals
              example: '3'
            indicators:
              type: array
              description: Array of technical indicators
              items:
                $ref: '#/components/schemas/SettingsIndicators'
              example: []
            indicatorGroups:
              type: array
              description: Groups of indicator conditions
              items:
                $ref: '#/components/schemas/SettingsIndicatorGroup'
              example: []
            type:
              type: string
              description: Bot or indicator type
              enum:
                - regular
                - terminal
                - trigger
              example: regular
            orderSizeType:
              type: string
              description: Order reference
              enum:
                - base
                - quote
                - percTotal
                - percFree
                - usd
              example: quote
            limitTimeout:
              type: string
              description: Timeout for limit orders (seconds)
              example: '300'
            useLimitTimeout:
              type: boolean
              description: Enable limit order timeout
              example: false
            notUseLimitReposition:
              type: boolean
              description: Disable limit order repositioning
              example: false
            cooldownAfterDealStart:
              type: boolean
              description: Enable cooldown after deal starts
              example: false
            cooldownAfterDealStartUnits:
              type: string
              description: Time units for cooldown
              enum:
                - seconds
                - minutes
                - hours
                - days
              example: minutes
            cooldownAfterDealStartInterval:
              type: number
              description: Cooldown interval value
              example: 60
            cooldownAfterDealStartOption:
              type: string
              description: Apply cooldown per symbol or bot
              enum:
                - symbol
                - bot
              example: symbol
            cooldownAfterDealStop:
              type: boolean
              description: Enable cooldown after deal stops
              example: false
            cooldownAfterDealStopUnits:
              type: string
              description: Time units for stop cooldown
              enum:
                - seconds
                - minutes
                - hours
                - days
              example: minutes
            cooldownAfterDealStopInterval:
              type: number
              description: Stop cooldown interval
              example: 30
            cooldownAfterDealStopOption:
              type: string
              description: Apply stop cooldown per symbol or bot
              enum:
                - symbol
                - bot
              example: bot
            moveSL:
              type: boolean
              description: Enable moving stop loss
              example: false
            moveSLTrigger:
              type: string
              description: Trigger value for moving SL
              example: '2.0'
            moveSLValue:
              type: string
              description: New SL value when triggered
              example: '0.5'
            moveSLForAll:
              type: boolean
              description: Apply moving SL to all orders
              example: false
            trailingSl:
              type: boolean
              description: Enable trailing stop loss
              example: false
            trailingTp:
              type: boolean
              description: Enable trailing take profit
              example: false
            trailingTpPerc:
              type: string
              description: Trailing take profit percentage
              example: '1.5'
            useCloseAfterX:
              type: boolean
              description: Enable close after X feature
              example: false
            useCloseAfterXwin:
              type: boolean
              description: Close after X wins
              example: false
            closeAfterXwin:
              type: string
              description: Number of wins before closing
              example: '5'
            useCloseAfterXloss:
              type: boolean
              description: Close after X losses
              example: false
            closeAfterXloss:
              type: string
              description: Number of losses before closing
              example: '3'
            useCloseAfterXprofit:
              type: boolean
              description: Close after reaching profit
              example: false
            closeAfterXprofitValue:
              type: string
              description: Profit value to trigger close
              example: '1000'
            closeAfterXprofitCond:
              type: string
              description: Condition for profit close
              enum:
                - cd
                - cu
                - gt
                - lt
              example: gt
            closeAfterX:
              type: string
              description: Close after X value
              example: '10'
            useCloseAfterXopen:
              type: boolean
              description: Close after X open deals
              example: false
            closeAfterXopen:
              type: string
              description: Number of open deals before closing
              example: '10'
            pair:
              type: array
              description: Trading pair symbol
              items:
                type: string
              example: BTC/USDT
            useMulti:
              type: boolean
              description: Enable multiple pairs trading
              example: false
            maxDealsPerPair:
              type: string
              description: Max deals per trading pair
              example: '2'
            ignoreStartDeals:
              type: boolean
              description: Ignore deals in start condition check
              example: false
            comboTpBase:
              type: string
              description: Base for combo TP calculation
              enum:
                - full
                - filled
              example: full
            botStart:
              type: string
              description: How the bot is started
              enum:
                - manual
                - webhook
                - indicators
                - price
              example: manual
            useBotController:
              type: boolean
              description: Enable bot controller
              example: false
            stopType:
              type: string
              description: How to stop the bot
              enum:
                - leave
                - cancel
                - closeByLimit
                - closeByMarket
              example: cancel
            stopStatus:
              type: string
              description: Bot status for stopping
              enum:
                - open
                - closed
                - range
                - error
                - archive
                - monitoring
              example: monitoring
            dealCloseCondition:
              type: string
              description: Condition for closing deal
              enum:
                - tp
                - techInd
                - manual
                - webhook
                - dynamicAr
              example: tp
            dealCloseConditionSL:
              type: string
              description: Condition for SL close
              enum:
                - tp
                - techInd
                - manual
                - webhook
                - dynamicAr
              example: tp
            useMinTP:
              type: boolean
              description: Use minimum take profit
              example: false
            minTp:
              type: string
              description: Minimum take profit value
              example: '1.0'
            closeDealType:
              type: string
              description: Type of deal close action
              enum:
                - leave
                - cancel
                - closeByLimit
                - closeByMarket
              example: closeByLimit
            closeOrderType:
              type: string
              description: Order type for closing position
              enum:
                - LIMIT
                - MARKET
              example: LIMIT
            terminalDealType:
              type: string
              description: Terminal deal handling type
              enum:
                - simple
                - smart
                - import
              example: smart
            useMultiTp:
              type: boolean
              description: Enable multiple take profit levels
              example: false
            multiTp:
              type: array
              description: Array of take profit targets
              items:
                $ref: '#/components/schemas/MultiTP'
              example: []
            useMultiSl:
              type: boolean
              description: Enable multiple stop loss levels
              example: false
            pairPrioritization:
              type: string
              description: How pairs are prioritized
              enum:
                - alphabetical
                - random
              example: alphabetical
            multiSl:
              type: array
              description: Array of stop loss targets
              items:
                $ref: '#/components/schemas/MultiTP'
              example: []
            marginType:
              type: string
              description: Margin type for futures
              enum:
                - inherit
                - cross
                - isolated
              example: cross
            leverage:
              type: number
              description: Leverage multiplier
              example: 10
            futures:
              type: boolean
              description: Enable futures trading
              example: false
            importFrom:
              type: string
              description: Import settings from bot ID
              example: bot-123
            gridLevel:
              type: string
              description: Current grid level
              example: '5'
            useVolumeFilter:
              type: boolean
              description: Filter pairs by volume
              example: false
            useRelativeVolumeFilter:
              type: boolean
              description: Filter by relative volume
              example: false
            volumeTop:
              type: string
              description: Top volume threshold
              example: '100'
            relativeVolumeTop:
              type: string
              description: Relative volume threshold
              example: '50'
            volumeValue:
              type: string
              description: Volume filter value
              enum:
                - top25
                - top100
                - top200
                - custom
              example: top100
            relativeVolumeValue:
              type: string
              description: Relative volume filter value
              enum:
                - top25
                - top100
                - top200
                - custom
              example: top100
            useFixedTPPrices:
              type: boolean
              description: Use fixed TP prices
              example: false
            useFixedSLPrices:
              type: boolean
              description: Use fixed SL prices
              example: false
            fixedTpPrice:
              type: string
              description: Fixed take profit price
              example: '55000'
            fixedSlPrice:
              type: string
              description: Fixed stop loss price
              example: '48000'
            baseStep:
              type: string
              description: Base step for grid
              example: '1.0'
            baseGridLevels:
              type: string
              description: Base number of grid levels
              example: '10'
            useActiveMinigrids:
              type: boolean
              description: Enable active minigrids
              example: false
            comboActiveMinigrids:
              type: string
              description: Number of active minigrids
              example: '3'
            comboSlLimit:
              type: boolean
              description: Use limit orders for combo SL
              example: false
            comboTpLimit:
              type: boolean
              description: Use limit orders for combo TP
              example: false
            closeByTimer:
              type: boolean
              description: Enable close by timer
              example: false
            closeByTimerValue:
              type: number
              description: Time value before closing
              example: 24
            closeByTimerUnits:
              type: string
              description: Time units for timer
              enum:
                - seconds
                - minutes
                - hours
                - days
              example: hours
            feeOrder:
              type: boolean
              description: Include fees in order calculation
              example: true
            maxDealsPerHigherTimeframe:
              type: string
              description: Max deals per timeframe
              example: '5'
            useMaxDealsPerHigherTimeframe:
              type: boolean
              description: Enable max deals per timeframe
              example: false
            remainderFullAmount:
              type: boolean
              description: Use full amount for remainder
              example: false
            autoRebalancing:
              type: boolean
              description: Enable automatic rebalancing
              example: false
            adaptiveClose:
              type: boolean
              description: Use adaptive close strategy
              example: false
            useStaticPriceFilter:
              type: boolean
              description: Enable static price filter
              example: false
            useCooldown:
              type: boolean
              description: Enable cooldown feature
              example: false
            useVolumeFilterAll:
              type: boolean
              description: Apply volume filter to all pairs
              example: false
            useDynamicPriceFilter:
              type: boolean
              description: Enable dynamic price filter
              example: false
            dynamicPriceFilterDeviation:
              type: string
              description: Deviation for dynamic price filter
              example: '5.0'
            dynamicPriceFilterOverValue:
              type: string
              description: Over value for price filter
              example: '10'
            dynamicPriceFilterUnderValue:
              type: string
              description: Under value for price filter
              example: '10'
            dynamicPriceFilterPriceType:
              type: string
              description: Price type for filter (avg/entry)
              enum:
                - avg
                - entry
              example: avg
            dynamicPriceFilterDirection:
              type: string
              description: Filter direction
              enum:
                - over
                - under
                - overAndUnder
              example: overAndUnder
            useRiskReward:
              type: boolean
              description: Enable risk/reward ratio
              example: false
            rrSlType:
              type: string
              description: Type of risk/reward stop loss
              enum:
                - fixed
                - indicator
              example: fixed
            rrSlFixedValue:
              type: string
              description: Fixed SL value for risk/reward
              example: '2.0'
            riskSlType:
              type: string
              description: Risk stop loss type
              enum:
                - perc
                - fixed
              example: perc
            riskSlAmountPerc:
              type: string
              description: Risk amount as percentage
              example: '2.0'
            riskSlAmountValue:
              type: string
              description: Risk amount value
              example: '100'
            riskUseTpRatio:
              type: boolean
              description: Use TP ratio in risk management
              example: false
            riskTpRatio:
              type: string
              description: Take profit ratio
              example: '2.0'
            riskMinPositionSize:
              type: string
              description: Minimum position size
              example: '50'
            riskMaxPositionSize:
              type: string
              description: Maximum position size
              example: '5000'
            dynamicArLockValue:
              type: boolean
              description: Lock dynamic AR value
              example: false
            comboUseSmartGrids:
              type: boolean
              description: Enable smart grids for combo bot
              example: false
            comboSmartGridsCount:
              type: string
              description: Number of smart grids
              example: '5'
            riskMaxSl:
              type: string
              description: Maximum stop loss
              example: '5.0'
            riskMinSl:
              type: string
              description: Minimum stop loss
              example: '0.5'
            scaleDcaType:
              type: string
              description: Type of DCA scaling
              enum:
                - percentage
                - atr
                - adr
              example: percentage
            startDealLogic:
              type: string
              description: Logic for start deal conditions (AND/OR)
              enum:
                - and
                - or
              example: and
            stopDealLogic:
              type: string
              description: Logic for stop deal conditions
              enum:
                - and
                - or
              example: or
            stopDealSlLogic:
              type: string
              description: Logic for stop loss conditions
              enum:
                - and
                - or
              example: and
            stopBotLogic:
              type: string
              description: Logic for stop bot conditions
              enum:
                - and
                - or
              example: or
            useRiskReduction:
              type: boolean
              description: Enable risk reduction
              example: false
            riskReductionValue:
              type: string
              description: Risk reduction percentage
              example: '10'
            useReinvest:
              type: boolean
              description: Enable profit reinvestment
              example: false
            reinvestValue:
              type: string
              description: Percentage of profit to reinvest
              example: '50'
            startBotPriceCondition:
              type: string
              description: Price condition to start bot
              enum:
                - cd
                - cu
                - gt
                - lt
              example: gt
            startBotPriceValue:
              type: string
              description: Price value for bot start
              example: '50000'
            stopBotPriceCondition:
              type: string
              description: Price condition to stop bot
              enum:
                - cd
                - cu
                - gt
                - lt
              example: lt
            stopBotPriceValue:
              type: string
              description: Price value for bot stop
              example: '45000'
            startBotLogic:
              type: string
              description: Logic for start bot conditions
              enum:
                - and
                - or
              example: and
            botActualStart:
              type: string
              description: Actual trigger for bot start
              enum:
                - manual
                - webhook
                - indicators
                - price
              example: indicators
            useNoOverlapDeals:
              type: boolean
              description: Prevent overlapping deals
              example: false
            useSeparateMaxDealsOverAndUnder:
              type: boolean
              description: Separate limits for over/under deals
              example: false
            maxDealsOver:
              type: string
              description: Max deals above entry
              example: '3'
            maxDealsUnder:
              type: string
              description: Max deals below entry
              example: '5'
            useSeparateMaxDealsOverAndUnderPerSymbol:
              type: boolean
              description: Per-symbol over/under limits
              example: false
            maxDealsOverPerSymbol:
              type: string
              description: Max over deals per symbol
              example: '2'
            maxDealsUnderPerSymbol:
              type: string
              description: Max under deals per symbol
              example: '3'
            dcaByMarket:
              type: boolean
              description: Execute DCA orders at market price
              example: false
    ComboBotSettings:
      type: object
      description: ComboBotSettings configuration
      properties: {}
      allOf:
        - $ref: '#/components/schemas/DCABotSettings'
        - type: object
          properties:
            gridLevel:
              type: string
              description: Current grid level
              example: '5'
            newBalance:
              type: boolean
              description: New balance mode
              example: false
            feeOrder:
              type: boolean
              description: Include fees in order calculation
              example: true
    SettingsIndicators:
      type: object
      description: SettingsIndicators configuration
      properties:
        type:
          type: string
          description: Bot or indicator type
          enum:
            - RSI
            - ADX
            - BBW
            - BB
            - MACD
            - Stoch
            - CCI
            - AO
            - StochRSI
            - WR
            - BullBear
            - UO
            - IC
            - TV
            - MA
            - SR
            - QFL
            - MFI
            - PSAR
            - VO
            - MOM
            - BBWP
            - ECD
            - XO
            - MAR
            - BBPB
            - DIV
            - ST
            - PC
            - ATR
            - PP
            - ADR
            - ATH
            - KC
            - KCPB
            - UNPNL
            - DC
            - OBFVG
          example: regular
        indicatorLength:
          type: number
          description: Indicator period length
          example: 14
        indicatorValue:
          type: string
          description: Indicator value threshold
          example: '70'
        indicatorCondition:
          type: string
          description: Comparison condition
          enum:
            - cd
            - cu
            - gt
            - lt
          example: gt
        indicatorInterval:
          type: string
          description: Chart timeframe
          enum:
            - 1m
            - 3m
            - 5m
            - 15m
            - 30m
            - 1h
            - 2h
            - 4h
            - 8h
